name: Collect entertainment hotspots

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/collect_hotspots.py"
      - "scripts/quality_gate.py"
      - "scripts/sensitive_gate.py"
      - "config/runtime-sources.json"
      - "config/health-gate.json"
      - "schema/**"
      - ".github/workflows/collect-hotspots.yml"
  schedule:
    # GitHub cron uses UTC. These are 00:00, 06:00, 12:00 and 18:00 Asia/Shanghai.
    - cron: "0 4,10,16,22 * * *"

permissions:
  contents: write

concurrency:
  group: entertainment-hotspot-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependency
        run: python -m pip install --disable-pip-version-check "jsonschema>=4.22,<5"

      - name: Collect candidate feeds
        id: collect
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python scripts/collect_hotspots.py 2>&1 | tee /tmp/collect.log

      - name: Apply semantic quality gate
        id: quality
        if: steps.collect.outcome == 'success'
        shell: bash
        run: |
          set -o pipefail
          python scripts/quality_gate.py 2>&1 | tee /tmp/quality.log

      - name: Apply sensitive-claim evidence gate
        id: sensitive
        if: steps.quality.outcome == 'success'
        shell: bash
        run: |
          set -o pipefail
          python scripts/sensitive_gate.py 2>&1 | tee /tmp/sensitive.log

      - name: Verify JSON, schemas and publishability
        id: verify
        if: steps.sensitive.outcome == 'success'
        shell: bash
        run: |
          set -o pipefail
          python - <<'PY' 2>&1 | tee /tmp/verify.log
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator, FormatChecker

          required = [
              "data/latest.json",
              "data/sources.json",
              "data/drama.json",
              "data/variety.json",
              "data/celebrity.json",
              "data/entertainment-events.json",
              "data/manifest.json",
              "data/status.json",
          ]
          documents = {}
          for name in required:
              path = Path(name)
              if not path.exists():
                  raise SystemExit(f"missing required file: {name}")
              documents[name] = json.loads(path.read_text("utf-8"))

          event_schema = json.loads(Path("schema/hotspot-v1.2.schema.json").read_text("utf-8"))
          source_schema = json.loads(Path("schema/source-record.schema.json").read_text("utf-8"))
          event_validator = Draft202012Validator(event_schema, format_checker=FormatChecker())
          source_validator = Draft202012Validator(source_schema, format_checker=FormatChecker())

          feed_files = [
              "data/latest.json",
              "data/drama.json",
              "data/variety.json",
              "data/celebrity.json",
              "data/entertainment-events.json",
          ]
          errors = []
          for name in feed_files:
              for error in event_validator.iter_errors(documents[name]):
                  location = "/".join(str(part) for part in error.absolute_path)
                  errors.append(f"{name}:{location}: {error.message}")
          for error in source_validator.iter_errors(documents["data/sources.json"]):
              location = "/".join(str(part) for part in error.absolute_path)
              errors.append(f"data/sources.json:{location}: {error.message}")
          if errors:
              raise SystemExit("schema validation failed:\n" + "\n".join(errors[:50]))

          status = documents["data/status.json"]
          validation = status.get("validation", {})
          publishability = status.get("publishability", {})
          if validation.get("overall") != "passed":
              raise SystemExit("overall validation is not passed")
          if validation.get("content_quality") != "passed":
              raise SystemExit("semantic content-quality validation is not passed")
          if validation.get("sensitive_claims") != "passed":
              raise SystemExit("sensitive-claim validation is not passed")
          if not publishability.get("can_publish", False):
              raise SystemExit("feed is not publishable")
          if publishability.get("publishable_event_count", 0) != len(documents["data/latest.json"].get("items", [])):
              raise SystemExit("publishable event count does not match latest feed")

          source_ids = {record["source_id"] for record in documents["data/sources.json"].get("records", [])}
          for event in documents["data/latest.json"].get("items", []):
              missing = set(event.get("source_ids", [])) - source_ids
              if missing:
                  raise SystemExit(f"event {event.get('id')} has missing source ids: {sorted(missing)}")

          print(json.dumps({
              "status": status.get("status"),
              "publishability": publishability,
              "quality_gate": status.get("quality_gate", {}),
              "sensitive_gate": status.get("sensitive_gate", {}),
          }, ensure_ascii=False))
          PY

      - name: Commit only fully validated data
        if: steps.verify.outcome == 'success'
        run: |
          if git diff --quiet -- data; then
            echo "No data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "data: refresh fully gated entertainment hotspots"
          git push

      - name: Save diagnostics and reject unvalidated output
        if: steps.collect.outcome == 'failure' || steps.quality.outcome == 'failure' || steps.sensitive.outcome == 'failure' || steps.verify.outcome == 'failure'
        shell: bash
        run: |
          mkdir -p logs
          {
            echo "checked_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "collect=${{ steps.collect.outcome }}"
            echo "quality=${{ steps.quality.outcome }}"
            echo "sensitive=${{ steps.sensitive.outcome }}"
            echo "verify=${{ steps.verify.outcome }}"
            for file in /tmp/collect.log /tmp/quality.log /tmp/sensitive.log /tmp/verify.log; do
              echo
              echo "===== ${file} ====="
              if [ -f "${file}" ]; then cat "${file}"; else echo "not generated"; fi
            done
          } > logs/last-gate-failure.txt
          git restore --worktree --staged data || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logs/last-gate-failure.txt
          git commit -m "logs: record hotspot gate failure" || true
          git push || true
          echo "Collector output was not committed because one or more mandatory gates failed."
          exit 1