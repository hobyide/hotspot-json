name: Collect entertainment hotspots

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. These are 00:00, 06:00, 12:00 and 18:00 Asia/Shanghai.
    - cron: "0 4,10,16,22 * * *"

permissions:
  contents: write

concurrency:
  group: entertainment-hotspot-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect and validate feeds
        id: collect
        continue-on-error: true
        run: python scripts/collect_hotspots.py

      - name: Verify generated JSON files
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          required = [
              "data/latest.json",
              "data/sources.json",
              "data/drama.json",
              "data/variety.json",
              "data/celebrity.json",
              "data/entertainment-events.json",
              "data/manifest.json",
              "data/status.json",
          ]
          for name in required:
              path = Path(name)
              if not path.exists():
                  raise SystemExit(f"missing required file: {name}")
              json.loads(path.read_text("utf-8"))
          status = json.loads(Path("data/status.json").read_text("utf-8"))
          if status.get("validation", {}).get("overall") == "failed":
              raise SystemExit("generated data failed validation")
          print(json.dumps(status.get("publishability", {}), ensure_ascii=False))
          PY

      - name: Commit validated data
        if: always()
        run: |
          if git diff --quiet -- data; then
            echo "No data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "data: refresh entertainment hotspots"
          git push

      - name: Fail workflow only when no publishable feed exists
        if: steps.collect.outcome == 'failure'
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          status = json.loads(Path("data/status.json").read_text("utf-8"))
          if not status.get("publishability", {}).get("can_publish", False):
              raise SystemExit("No publishable current or cached feed")
          print("Collector had source failures, but a validated publishable feed is preserved.")
          PY
